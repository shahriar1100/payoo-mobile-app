<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="src/output.css" />
    <!-- fontawesome cdn  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <!-- fontawesome cdn  -->
  </head>
  <body
    class="min-h-screen relative bg-gradient-to-br from-blue-200 via-blue-400 to-blue-700 flex items-center justify-center animate-gradient"
  >
    <div
      class="border absolute -top-5 scale-85 hover:scale-87 border-white/30 shadow-xl shadow-blue-900/30 backdrop-blur-md bg-white/80 w-[500px] transition-all duration-300 hover:shadow-2xl"
    >
      <!-- payoo heading -->
      <div
        class="flex items-center justify-between border-b-2 border-b-[#0808081e] py-5 px-6"
      >
        <div class="headingLeft flex items-center">
          <img
            class="w-12 mr-2"
            src="assets/Group.png"
            alt="assets/Group.png"
          />
          <div class="headingLeftText">
            <h3 class="text-[#080808] font-extrabold text-lg">
              $<span id="availableBlnc">45000</span>
            </h3>
            <p class="text-[#08080870] font-normal text-sm">
              Available Balance
            </p>
          </div>
        </div>
        <div class="headingRight">
          <button
            class="rounded-[8px] py-2.5 px-3 border-2 border-[#08080815] text-[#08080870]"
          >
            <i
              class="fa-solid text-[#666768] fa-arrow-right-from-bracket rotate-180 mr-2"
            ></i
            >Logout
          </button>
        </div>
      </div>
      <!-- payoo heading -->
      <!-- payoo main feature section -->
      <div class="mt-8 px-6 pb-8 rounded-3xl">
        <div class="titleSection space-y-3">
          <h1 class="text-[#080808] text-2xl font-extrabold">
            🔥 Welcome to Payooo!
          </h1>
          <p class="text-[#08080870] font-normal text-sm">
            Enjoy easy and convenient financial services with us. Cashout charge
            is low and
          </p>
        </div>
        <!-- money feture section -->
        <div class="mt-6 grid grid-cols-3 gap-4">
          <div
            id="addMoneyBox"
            class="cardFeature bg-[#f4f5f7] border-1 hover:border-1 hover:border-[#0874F2] transition-all duration-300 group hover:bg-hoverBlue border-[#0808081e] rounded-lg text-center space-y-2 py-5"
          >
            <img
              class="mx-auto"
              src="assets/wallet1.png"
              alt="assets/wallet1.png"
            />
            <h3 class="text-[#0808089a] text-sm group-hover:text-[#0874F2]">
              Add Money
            </h3>
          </div>
          <div
            id="cashOutBox"
            class="cardFeature bg-[#f4f5f7] border-1 hover:border-1 hover:border-[#0874F2] transition-all duration-300 group hover:bg-[#0875f21f] border-[#0808081e] rounded-lg text-center space-y-2 py-5"
          >
            <img
              class="mx-auto"
              src="assets/send1.png"
              alt="assets/send1.png"
            />
            <h3 class="text-[#0808089a] text-sm group-hover:text-[#0874F2]">
              Cashout
            </h3>
          </div>
          <div
            id="transferMoneyBox"
            class="cardFeature bg-[#f4f5f7] border-1 hover:border-1 hover:border-[#0874F2] transition-all duration-300 group hover:bg-[#0875f21f] border-[#0808081e] rounded-lg text-center space-y-2 py-5"
          >
            <img
              class="mx-auto"
              src="assets/money1.png"
              alt="assets/money1.png"
            />
            <h3 class="text-[#0808089a] text-sm group-hover:text-[#0874F2]">
              Transfer Money
            </h3>
          </div>
          <div
            id="getBonusBox"
            class="cardFeature bg-[#f4f5f7] border-1 hover:border-1 hover:border-[#0874F2] transition-all duration-300 group hover:bg-[#0875f21f] border-[#0808081e] rounded-lg text-center space-y-2 py-5"
          >
            <img
              class="mx-auto"
              src="assets/bonus1.png"
              alt="assets/bonus1.png"
            />
            <h3 class="text-[#0808089a] text-sm group-hover:text-[#0874F2]">
              Get Bonus
            </h3>
          </div>
          <div
            id="payBillBox"
            class="cardFeature bg-[#f4f5f7] border-1 hover:border-1 hover:border-[#0874F2] transition-all duration-300 group hover:bg-[#0875f21f] border-[#0808081e] rounded-lg text-center space-y-2 py-5"
          >
            <img
              class="mx-auto"
              src="assets/purse1.png"
              alt="assets/purse1.png"
            />
            <h3 class="text-[#0808089a] text-sm group-hover:text-[#0874F2]">
              Pay Bill
            </h3>
          </div>
          <div
            id="transactionsBox"
            class="cardFeature bg-[#f4f5f7] border-1 hover:border-1 hover:border-[#0874F2] transition-all duration-300 group hover:bg-[#0875f21f] border-[#0808081e] rounded-lg text-center space-y-2 py-5"
          >
            <img
              class="mx-auto"
              src="assets/transaction1.png"
              alt="assets/transaction1.png"
            />
            <h3 class="text-[#0808089a] text-sm group-hover:text-[#0874F2]">
              Transactions
            </h3>
          </div>
        </div>
        <!-- money feture section -->
      </div>
      <!-- payoo main feature section -->

      <!-- add money section form -->
      <section id="addMoneyForm" class="allForm">
        <div class="bg-[#f4f5f7] pt-8">
          <h1 class="text-xl font-semibold text-gray-800 mb-4 pl-6">
            Add Money
          </h1>
          <div
            class="bg-white/80 backdrop-blur-md rounded-2xl shadow-xl p-6 w-[450px] mx-auto"
          >
            <form class="space-y-2">
              <!-- Select Bank -->
              <div>
                <label class="text-sm text-gray-600 font-medium"
                  >Select A Bank</label
                >
                <select
                  id="bank"
                  class="w-full mt-2 h-11 px-4 rounded-xl bg-gray-100 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
                  <option disabled selected>Select bank</option>
                  <option>DBBL (Dutch Bangla Bank)</option>
                  <option>BRAC Bank</option>
                  <option>Islami Bank</option>
                  <option>City Bank</option>
                  <option>Eastern Bank</option>
                </select>
              </div>

              <!-- Account Number -->
              <div>
                <label class="text-sm text-gray-600 font-medium"
                  >Bank Account Number</label
                >
                <input
                  id="accountNumber"
                  type="text"
                  placeholder="Enter 11 digit account number"
                  class="w-full mt-2 h-11 px-4 rounded-xl bg-gray-100 text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>

              <!-- Pin -->
              <div>
                <label class="text-sm text-gray-600 font-medium"
                  >Pin Number</label
                >
                <input
                  id="pinInput"
                  type="password"
                  placeholder="Enter 4 digit pin number"
                  class="w-full mt-2 h-11 px-4 rounded-xl bg-gray-100 text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>
              <!-- Amount -->
              <div>
                <label class="text-sm text-gray-600 font-medium"
                  >Amount to Add</label
                >
                <input
                  id="addAmount"
                  type="text"
                  placeholder="Add Amount"
                  class="w-full mt-2 h-11 px-4 rounded-xl bg-gray-100 text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>

              <!-- Button -->
              <button
                id="addMoneyBtn"
                class="w-full bg-gradient-to-r from-blue-500 to-blue-700 text-white font-semibold py-2.5 rounded-xl mt-2 transition-all duration-300 hover:from-blue-600 hover:to-blue-800 hover:scale-[1.02] active:scale-95 shadow-md"
              >
                Add Money
              </button>
            </form>
          </div>
        </div>
      </section>
      <!-- add money section form -->

      <!-- cash out -->
      <section id="cashOutForm" class="allForm hidden">
        <div class="bg-[#f4f5f7] pt-8">
          <!-- Title -->
          <h1 class="text-lg font-semibold text-gray-800 mb-4 pl-6">
            Cash Out
          </h1>
          <div
            class="bg-white/80 backdrop-blur-md rounded-2xl shadow-xl p-6 w-[450px] mx-auto"
          >
            <form class="space-y-4">
              <!-- Agent Number -->
              <div>
                <label class="text-sm text-gray-600 font-medium"
                  >Agent Number</label
                >
                <input
                  id="cashOutAgentNum"
                  type="text"
                  placeholder="Enter 11 digit number"
                  class="w-full mt-2 h-11 px-4 rounded-xl bg-gray-100 text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>

              <!-- Pin -->
              <div>
                <label class="text-sm text-gray-600 font-medium"
                  >Pin Number</label
                >
                <input
                  id="cashOutPinNum"
                  type="password"
                  placeholder="Enter 4 digit pin number"
                  class="w-full mt-2 h-11 px-4 rounded-xl bg-gray-100 text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>

              <!-- Amount -->
              <div>
                <label class="text-sm text-gray-600 font-medium">Amount</label>
                <input
                  id="cashOutAddAmount"
                  type="text"
                  placeholder="Enter amount to withdraw"
                  class="w-full mt-2 h-11 px-4 rounded-xl bg-gray-100 text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>

              <!-- Button -->
              <button
                id="cashOutBtn"
                class="w-full rounded-2xl bg-gradient-to-r from-blue-500 to-blue-700 text-white font-semibold py-2.5 rounded-full mt-3 transition-all duration-300 hover:from-blue-600 hover:to-blue-800 hover:scale-95 active:scale-90 shadow-md"
              >
                Withdraw Money
              </button>
            </form>
          </div>
        </div>
      </section>
      <!-- cash out -->
      <!-- transfer money -->
      <section id="transferMoney" class="allForm hidden">
        <div class="bg-[#f4f5f7] pt-8">
          <!-- Title -->
          <h1 class="text-lg font-semibold text-gray-800 mb-4 pl-6">
            Transfer Money
          </h1>
          <div
            class="bg-white/80 backdrop-blur-md rounded-2xl shadow-xl p-6 w-[450px] mx-auto"
          >
            <form class="space-y-4">
              <!-- User Account Number -->
              <div>
                <label class="text-sm text-gray-600 font-medium"
                  >User Account Number</label
                >
                <input
                  id="transferAccountNum"
                  type="text"
                  placeholder="Enter 11 digit number"
                  class="w-full mt-2 h-11 px-4 rounded-xl bg-gray-100 text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>

              <!-- Amount -->
              <div>
                <label class="text-sm text-gray-600 font-medium">Amount</label>
                <input
                  id="transferAddAmount"
                  type="text"
                  placeholder="Enter amount to Transfer"
                  class="w-full mt-2 h-11 px-4 rounded-xl bg-gray-100 text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>

              <!-- Pin -->
              <div>
                <label class="text-sm text-gray-600 font-medium"
                  >Pin Number</label
                >
                <input
                  id="transferPinNum"
                  type="password"
                  placeholder="Enter 4 digit pin number"
                  class="w-full mt-2 h-11 px-4 rounded-xl bg-gray-100 text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>

              <!-- Button -->
              <button
                id="transferBtn"
                class="w-full rounded-2xl bg-gradient-to-r from-blue-500 to-blue-700 text-white font-semibold py-2.5 rounded-full mt-3 transition-all duration-300 hover:from-blue-600 hover:to-blue-800 hover:scale-95 active:scale-90 shadow-md"
              >
                Send Now
              </button>
            </form>
          </div>
        </div>
      </section>
      <!-- transfer money -->

      <!-- get bonus -->
      <section id="getBonus" class="allForm hidden">
        <div class="bg-[#f4f5f7] pt-8">
          <!-- Title -->
          <h1 class="text-lg font-semibold text-gray-800 mb-4 pl-6">
            Get Bonus
          </h1>
          <div
            class="bg-white/80 backdrop-blur-md rounded-2xl shadow-xl p-6 w-[450px] mx-auto"
          >
            <form class="space-y-4">
              <!-- cupon -->
              <div>
                <label class="text-sm text-gray-600 font-medium"
                  >Enter Bonus Coupon</label
                >
                <input
                  id="getBonusInput"
                  type="text"
                  placeholder="Enter Bonus Coupon"
                  class="w-full mt-2 h-11 px-4 rounded-xl bg-gray-100 text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>

              <!-- Button -->
              <button
                id="getBonusBtn"
                class="w-full rounded-2xl bg-gradient-to-r from-blue-500 to-blue-700 text-white font-semibold py-2.5 rounded-full mt-3 transition-all duration-300 hover:from-blue-600 hover:to-blue-800 hover:scale-95 active:scale-90 shadow-md"
              >
                Get Bonus
              </button>
            </form>
          </div>
        </div>
      </section>
      <!-- get bonus -->

      <!-- pay bill -->
      <section id="payBill" class="allForm hidden">
        <div class="bg-[#f4f5f7] pt-8">
          <h1 class="text-xl font-semibold text-gray-800 mb-4 pl-6">
            Pay Bill
          </h1>
          <div
            class="bg-white/80 backdrop-blur-md rounded-2xl shadow-xl p-6 w-[450px] mx-auto"
          >
            <form class="space-y-2">
              <!-- Select To Pay -->
              <div>
                <label class="text-sm text-gray-600 font-medium"
                  >Select To Pay</label
                >
                <select
                  id="payBillBank"
                  class="w-full mt-2 h-11 px-4 rounded-xl bg-gray-100 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
                  <option disabled selected>Select back</option>
                  <option>DBBL (Dutch Bangla Bank)</option>
                  <option>BRAC Bank</option>
                  <option>Islami Bank</option>
                  <option>City Bank</option>
                  <option>Eastern Bank</option>
                </select>
              </div>

              <!-- Biller Account Number -->
              <div>
                <label class="text-sm text-gray-600 font-medium"
                  >Enter account number</label
                >
                <input
                  id="accountNumberPayBill"
                  type="text"
                  placeholder="Enter 11 digit account number"
                  class="w-full mt-2 h-11 px-4 rounded-xl bg-gray-100 text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>

              <!-- Amount to Pay -->
              <div>
                <label class="text-sm text-gray-600 font-medium"
                  >Amount to Pay</label
                >
                <input
                  id="addAmountPayBill"
                  type="text"
                  placeholder="Add Amount to pay"
                  class="w-full mt-2 h-11 px-4 rounded-xl bg-gray-100 text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>

              <!-- Pin -->
              <div>
                <label class="text-sm text-gray-600 font-medium"
                  >Pin Number</label
                >
                <input
                  id="pinInputPayBill"
                  type="password"
                  placeholder="Enter 4 digit pin number"
                  class="w-full mt-2 h-11 px-4 rounded-xl bg-gray-100 text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>

              <!-- Button -->
              <button
                id="payBillMoneyBtn"
                class="w-full bg-gradient-to-r from-blue-500 to-blue-700 text-white font-semibold py-2.5 rounded-xl mt-2 transition-all duration-300 hover:from-blue-600 hover:to-blue-800 hover:scale-[1.02] active:scale-95 shadow-md"
              >
                Pay Now
              </button>
            </form>
          </div>
        </div>
      </section>
      <!-- pay bill -->

      <!-- transiction -->
      <section id="transiction" class="allForm hidden">
        <div class="bg-[#f4f5f7] pt-8">
          <div class="flex justify-between items-center px-6">
            <h1 class="text-xl font-semibold text-gray-800 mb-4">
              Transactions
            </h1>
            <p class="text-gray-400 text-sm">View All</p>
          </div>

          <!-- transiction history -->
          <div id="transectionContainer" class="space-y-3">
            
          </div>
        </div>
      </section>
      <!-- transiction -->
    </div>

    <script src="home.js"></script>
  </body>
</html>
